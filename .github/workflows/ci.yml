name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build-test-coverage:
    name: Build, Test and Coverage
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build check (TypeScript)
        run: bunx tsc --noEmit

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov | tee coverage-output.txt

      - name: Upload coverage to Codecov
        if: always() && hashFiles('api/coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: api/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: false

      - name: Add coverage to job summary
        if: always() && hashFiles('api/coverage-output.txt') != ''
        run: |
          echo "### Coverage (Bun)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 40 api/coverage-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            api/coverage/**
            api/coverage-output.txt
          if-no-files-found: warn
