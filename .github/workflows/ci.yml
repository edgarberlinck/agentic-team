name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build-test-coverage:
    name: Build, Test and Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build check (TypeScript)
        run: bunx tsc --noEmit

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      - name: Upload coverage to Codecov
        if: always() && hashFiles('api/coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: api/coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: false

      - name: Generate coverage summary
        if: always() && hashFiles('api/coverage/lcov.info') != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: api/coverage/lcov.info
          format: markdown
          output: both
          fail_below_min: false
          hide_branch_rate: false
          hide_complexity: true
          indicators: true

      - name: Add coverage to job summary
        if: always() && hashFiles('code-coverage-results.md') != ''
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            api/coverage/**
            code-coverage-results.md
          if-no-files-found: warn
